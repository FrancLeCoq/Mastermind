<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MASTERMIND — Le Coq Francis</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka+One&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
:root{
  --bg1:#0d0520; --bg2:#1a0840;
  --gold:#FFD700; --purple:#c084fc; --purple-d:#6d28d9;
  --green:#16a34a; --green-l:#a3e635;
  --orange:#d97706; --orange-l:#fcd34d;
  --cyan:#0ea5e9;
  --txt:#fff; --muted:#c9aaee;
}
html,body{height:100%}
body{
  background:linear-gradient(160deg,var(--bg1),var(--bg2));
  background-attachment:fixed;
  font-family:'Fredoka One',cursive;
  color:var(--txt);
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center;
  padding:14px 14px calc(14px + env(safe-area-inset-bottom));
  overflow-x:hidden;
}
body::before{
  content:''; position:fixed; top:-120px; left:50%; transform:translateX(-50%);
  width:380px; height:380px; border-radius:50%;
  background:radial-gradient(circle,rgba(120,40,200,0.35),transparent 70%);
  pointer-events:none; z-index:0;
}
.app{width:100%; max-width:420px; position:relative; z-index:1; display:flex; flex-direction:column; align-items:center}

/* ===== HEADER ===== */
.brand{display:flex; flex-direction:column; align-items:center; margin-bottom:14px; margin-top:4px}
.brand img{width:96px; height:96px; object-fit:contain; filter:drop-shadow(0 6px 18px rgba(0,0,0,0.6)); animation:bob 3.2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-7px) rotate(1deg)}}
.brand h1{
  font-family:'Bangers',cursive; font-size:34px; letter-spacing:4px;
  color:var(--gold); text-shadow:0 0 22px rgba(255,215,0,0.55),0 3px 0 rgba(0,0,0,0.35);
  margin-top:2px; line-height:1;
}
.brand .tagline{font-size:11px; color:var(--muted); letter-spacing:1px; margin-top:3px}

/* ===== CARD ===== */
.card{
  width:100%;
  background:linear-gradient(145deg,rgba(13,5,32,0.95),rgba(30,10,65,0.95));
  border:2px solid rgba(180,100,255,0.30);
  border-radius:24px; padding:22px 18px;
  box-shadow:0 0 50px rgba(120,40,200,0.35);
}
.hidden{display:none!important}

/* ===== PLEIN ECRAN EN JEU ===== */
body.playing{padding:0; justify-content:flex-start}
body.playing .brand{display:none}
body.playing .app{max-width:480px}
body.playing #screenGame.card{
  border:none; border-radius:0; box-shadow:none; background:transparent;
  padding:10px 10px calc(14px + env(safe-area-inset-bottom));
  min-height:100vh; display:flex; flex-direction:column;
}

/* ===== Menu buttons ===== */
.menu-btn{
  width:100%; padding:18px 18px; border:none; border-radius:16px;
  font-family:'Bangers',cursive; font-size:22px; letter-spacing:2px;
  color:#fff; cursor:pointer; margin-bottom:14px;
  display:flex; align-items:center; justify-content:center; gap:12px;
  touch-action:manipulation; transition:transform .12s,box-shadow .12s,opacity .12s;
  position:relative; overflow:hidden;
}
.menu-btn:active{transform:scale(0.97)}
.menu-btn .ico{font-size:24px; line-height:1}
.menu-btn .lock{position:absolute; right:14px; font-size:20px}
#btnComp{padding-right:44px; font-size:21px}
#btnWallet{padding-right:44px; padding-top:12px; padding-bottom:12px; font-size:18px}
.wallet-text{display:flex; flex-direction:column; align-items:center; line-height:1.1}
.wallet-sub{font-family:'Fredoka One',cursive; font-size:10px; letter-spacing:0.5px; margin-top:3px; opacity:.95}
.wallet-sub.ok{color:#bbf7d0}
.wallet-sub.warn{color:#fde68a}

.btn-comp-green{background:linear-gradient(135deg,#16a34a,#15803d); box-shadow:0 5px 22px rgba(22,163,74,0.45)}
.btn-comp-orange{background:linear-gradient(135deg,#d97706,#b45309); box-shadow:0 5px 22px rgba(217,119,6,0.40)}
.btn-unique{background:linear-gradient(135deg,#16a34a,#15803d); box-shadow:0 5px 22px rgba(22,163,74,0.45)}
.btn-wallet{background:linear-gradient(135deg,#0ea5e9,#0284c7); box-shadow:0 5px 22px rgba(14,165,233,0.45)}
.btn-purple{background:linear-gradient(135deg,#7c3aed,#5b21b6); box-shadow:0 5px 22px rgba(124,58,237,0.45)}
.btn-neutral{background:rgba(109,40,217,0.25); border:1px solid rgba(168,85,247,0.4); box-shadow:none}

/* Status / wallet bar */
.status-bar{border-radius:14px; padding:12px 14px; margin-bottom:16px; font-size:12px; line-height:1.6}
.status-bar.franc{background:rgba(22,163,74,0.15); border:1.5px solid rgba(163,230,53,0.5); color:#86efac}
.status-bar.no-franc{background:rgba(217,119,6,0.10); border:1.5px solid rgba(217,119,6,0.4); color:var(--orange-l)}
.status-bar b{color:var(--gold)}

/* Language flags */
.lang-row{display:flex; justify-content:center; gap:14px; margin-top:6px}
.flag-btn{
  width:66px; height:46px; border-radius:12px; cursor:pointer;
  border:2px solid rgba(168,85,247,0.4); background:rgba(255,255,255,0.05);
  display:flex; align-items:center; justify-content:center;
  touch-action:manipulation; transition:transform .12s,border-color .12s; overflow:hidden;
}
.flag-btn:active{transform:scale(0.92)}
.flag-btn.active{border-color:var(--gold); box-shadow:0 0 18px rgba(255,215,0,0.45)}
.flag-btn svg{width:48px; height:32px; border-radius:4px; display:block}

/* Back button */
.back-btn{
  display:flex; align-items:center; gap:6px; width:100%;
  background:rgba(109,40,217,0.2); border:1px solid rgba(168,85,247,0.4);
  color:#a78bfa; font-size:14px; font-family:'Fredoka One',cursive;
  cursor:pointer; margin-bottom:16px; padding:9px 14px; border-radius:10px;
  touch-action:manipulation; transition:opacity .12s,transform .12s;
}
.back-btn:active{opacity:.7; transform:scale(0.98)}
.back-btn::before{content:'\2190'; font-size:18px; font-weight:bold}

/* Section title */
.sec-title{font-family:'Bangers',cursive; font-size:24px; letter-spacing:2px; color:var(--purple); text-align:center; margin-bottom:14px}
.sec-sub{font-size:11px; color:var(--muted); text-align:center; margin-top:-8px; margin-bottom:16px; line-height:1.5}

/* Difficulty buttons */
.lvl-btn{
  width:100%; display:flex; align-items:center; justify-content:space-between;
  padding:15px 16px; border-radius:14px; margin-bottom:11px; cursor:pointer;
  font-family:'Fredoka One',cursive; font-size:15px; color:#fff;
  border:1.5px solid rgba(168,85,247,0.35); background:rgba(124,58,237,0.18);
  touch-action:manipulation; transition:transform .12s;
}
.lvl-btn:active{transform:scale(0.98)}
.lvl-btn.lockedb{opacity:.55}
.lvl-btn .ll{display:flex; align-items:center; gap:8px}
.lvl-btn .stars{font-size:13px}
.lvl-btn .meta-mini{font-size:10px; color:var(--muted); margin-left:4px}

/* Scores */
.scores-box{margin-top:6px; background:rgba(255,255,255,0.04); border:1px solid rgba(168,85,247,0.25); border-radius:14px; padding:14px}
.scores-box .sh{font-family:'Bangers',cursive; letter-spacing:1px; color:var(--gold); font-size:16px; margin-bottom:10px; text-align:center}
.score-row{display:flex; align-items:center; justify-content:space-between; padding:8px 10px; border-radius:10px; margin-bottom:6px; font-size:13px; background:rgba(255,255,255,0.03)}
.score-row .rank{font-family:'Bangers',cursive; font-size:18px; width:26px}
.score-row.r1 .rank{color:#FFD700}.score-row.r2 .rank{color:#d1d5db}.score-row.r3 .rank{color:#cd7f32}
.score-row .val{font-family:'Bangers',cursive; letter-spacing:1px; color:var(--green-l); font-size:16px}
.score-row .meta{font-size:10px; color:var(--muted)}
.no-scores{text-align:center; color:var(--muted); font-size:12px; padding:8px; line-height:1.6}

/* ===== GAME SCREEN ===== */
.game-top{display:flex; align-items:center; justify-content:space-between; width:100%; margin-bottom:10px; gap:8px; padding-right:58px}
.game-top .lvl-badge{font-family:'Bangers',cursive; letter-spacing:1px; font-size:16px; color:var(--gold); flex:1; text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.hud{display:flex; gap:8px; flex-wrap:wrap; justify-content:center; width:100%; margin-bottom:12px}
.hud .chip{
  background:rgba(255,255,255,0.06); border:1px solid rgba(168,85,247,0.3);
  border-radius:12px; padding:6px 12px; font-size:13px; display:flex; align-items:center; gap:6px;
}
.hud .chip .lab{font-size:9px; color:var(--muted); letter-spacing:.5px}
.hud .chip .num{font-family:'Bangers',cursive; font-size:17px; letter-spacing:1px}
.chip.lives .num{color:#fca5a5}
.chip.franc .num{color:var(--green-l)}
.chip.time .num{color:var(--cyan)}
.chip.tries .num{color:var(--orange-l)}

/* mini coq */
.mini-pilote{position:fixed; top:calc(8px + env(safe-area-inset-top)); right:10px; width:50px; height:50px; z-index:5; pointer-events:none; opacity:.92; filter:drop-shadow(0 3px 8px rgba(0,0,0,0.6)); animation:bob 3.6s ease-in-out infinite}

/* ===== MASTERMIND BOARD ===== */
.board-wrap{width:100%; flex:1; display:flex; flex-direction:column; align-items:center; overflow-y:auto; padding:4px 0 8px}
.rows{display:flex; flex-direction:column; gap:7px; width:100%; max-width:430px}
.row{
  display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:14px;
  background:rgba(255,255,255,0.03); border:1px solid rgba(168,85,247,0.18);
}
.row.active{border-color:var(--cyan); background:rgba(14,165,233,0.10); box-shadow:0 0 14px rgba(14,165,233,0.25)}
.row .rownum{font-family:'Bangers',cursive; font-size:13px; color:var(--muted); width:22px; text-align:center}
.pegs{display:flex; gap:7px; flex:1; justify-content:center}
.peg{
  width:34px; height:34px; border-radius:50%;
  border:2px solid rgba(0,0,0,0.35); cursor:pointer;
  box-shadow:inset 0 -3px 6px rgba(0,0,0,0.35), inset 0 3px 5px rgba(255,255,255,0.25);
  display:flex; align-items:center; justify-content:center;
  transition:transform .1s; flex-shrink:0;
}
.peg:active{transform:scale(0.9)}
.peg.empty{background:rgba(255,255,255,0.06); border-color:rgba(168,85,247,0.3); box-shadow:inset 0 2px 5px rgba(0,0,0,0.4)}
.peg.sel{outline:3px solid var(--gold); outline-offset:1px}
/* feedback pegs */
.feedback{display:grid; grid-template-columns:repeat(2,1fr); gap:3px; width:34px; flex-shrink:0}
.fb{width:13px; height:13px; border-radius:50%; background:rgba(255,255,255,0.08); border:1px solid rgba(0,0,0,0.3)}
.fb.black{background:#22c55e; box-shadow:0 0 6px rgba(34,197,94,0.7)}
.fb.white{background:#f97316; box-shadow:0 0 6px rgba(249,115,22,0.7)}
@keyframes popfb{0%{transform:scale(0)}70%{transform:scale(1.3)}100%{transform:scale(1)}}
.fb.black,.fb.white{animation:popfb .3s ease-out}

/* secret reveal row */
.secret-row{display:flex; gap:7px; justify-content:center; margin:10px 0}
.secret-row .peg{width:40px; height:40px; animation:popGood .4s ease-out}
@keyframes popGood{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}

/* ===== COLOR PALETTE PAD ===== */
.pad{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; width:100%; max-width:430px; margin:10px auto 0}
.pad-peg{
  width:42px; height:42px; border-radius:50%;
  border:2px solid rgba(0,0,0,0.4); cursor:pointer;
  box-shadow:inset 0 -3px 6px rgba(0,0,0,0.35), inset 0 3px 5px rgba(255,255,255,0.3);
  touch-action:manipulation; transition:transform .1s; flex-shrink:0;
}
.pad-peg:active{transform:scale(0.88)}
.pad-peg.sel{outline:3px solid var(--gold); outline-offset:2px; transform:scale(1.08)}

.pad-tools{display:grid; grid-template-columns:repeat(3,1fr); gap:6px; width:100%; max-width:430px; margin:8px auto 0}
body.mode-free .pad-tools{grid-template-columns:repeat(2,1fr)}
.tool-btn{
  background:rgba(255,255,255,0.06); border:1.5px solid rgba(168,85,247,0.35);
  border-radius:12px; padding:11px 2px; font-family:'Fredoka One'; font-size:11px;
  color:#fff; cursor:pointer; touch-action:manipulation; transition:transform .1s;
  display:flex; align-items:center; justify-content:center; gap:4px; min-width:0;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.tool-btn:active{transform:scale(0.94)}
.tool-btn.disabled{opacity:.4; pointer-events:none}

/* ===== OVERLAYS ===== */
.overlay{
  position:fixed; inset:0; z-index:50; display:none;
  align-items:center; justify-content:center; padding:24px;
  background:rgba(5,2,15,0.82); backdrop-filter:blur(6px);
}
.overlay.show{display:flex; animation:fadein .25s}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.modal{
  width:100%; max-width:340px; text-align:center;
  background:linear-gradient(145deg,rgba(13,5,32,0.98),rgba(30,10,65,0.98));
  border:2px solid rgba(180,100,255,0.4); border-radius:24px; padding:26px 22px;
  box-shadow:0 0 60px rgba(120,40,200,0.5); animation:pop .3s cubic-bezier(.2,1.4,.5,1)
}
@keyframes pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.modal img{width:120px; height:120px; object-fit:contain; margin-bottom:10px; filter:drop-shadow(0 6px 16px rgba(0,0,0,0.6))}
.modal h2{font-family:'Bangers',cursive; font-size:30px; letter-spacing:2px; margin-bottom:8px}
.modal h2.win{color:var(--green-l); text-shadow:0 0 20px rgba(163,230,53,0.5)}
.modal h2.lose{color:#fca5a5; text-shadow:0 0 20px rgba(239,68,68,0.4)}
.modal h2.locked{color:var(--orange-l)}
.modal p{font-size:13px; color:var(--muted); line-height:1.7; margin-bottom:18px}
.modal p b{color:var(--gold)}
.modal .modal-score{font-family:'Bangers',cursive; font-size:26px; color:var(--green-l); margin:6px 0 14px; letter-spacing:1px}
.modal .secret-modal{display:flex; gap:6px; justify-content:center; margin:4px 0 16px}
.modal .secret-modal .peg{width:30px;height:30px}

/* life flash */
.life-flash{position:fixed; inset:0; z-index:60; display:none; align-items:center; justify-content:center; pointer-events:none}
.life-flash.show{display:flex}
.life-flash img{width:160px; height:160px; object-fit:contain; animation:lifepop .9s ease-out forwards; filter:drop-shadow(0 6px 16px rgba(0,0,0,0.6))}
@keyframes lifepop{0%{transform:scale(.3) translateY(40px);opacity:0}25%{transform:scale(1.1) translateY(0);opacity:1}70%{transform:scale(1) translateY(0);opacity:1}100%{transform:scale(.9) translateY(-30px);opacity:0}}
.life-flash .lf-txt{position:absolute; bottom:30%; font-family:'Bangers',cursive; font-size:28px; color:#fca5a5; letter-spacing:2px; text-shadow:0 0 20px rgba(239,68,68,0.6); animation:lifepop .9s ease-out forwards}

/* toast */
.toast{
  position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px);
  background:rgba(217,119,6,0.95); color:#fff; padding:12px 18px; border-radius:14px;
  font-size:13px; z-index:70; opacity:0; transition:opacity .25s,transform .25s; max-width:90%;
  text-align:center; box-shadow:0 6px 24px rgba(0,0,0,0.5); pointer-events:none;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

.legend{font-size:10px; color:var(--muted); text-align:center; margin-top:8px; line-height:1.6}
.legend b{color:#fff}
.dot{display:inline-block; width:11px;height:11px;border-radius:50%;vertical-align:-1px;margin:0 2px}
.dot.black{background:#22c55e}.dot.white{background:#f97316}
</style>
</head>
<body>
<div class="app">

  <!-- BRAND HEADER -->
  <div class="brand">
    <img alt="Francis" id="brandImg">
    <h1>MASTERMIND</h1>
    <div class="tagline" id="tagline">LE COQ FRANCIS</div>
  </div>

  <!-- ============ MENU ============ -->
  <div class="card" id="screenMenu">

    <button class="menu-btn btn-unique" onclick="show('screenFree')">
      <span class="ico">&#127919;</span><span id="lblFree">JEU LIBRE</span>
    </button>

    <button class="menu-btn btn-comp-orange" id="btnComp" onclick="openCompetition()">
      <span class="ico">&#127942;</span><span id="lblComp">COMPETITION</span>
      <span class="lock" id="compLock">&#128274;</span>
    </button>

    <button class="menu-btn btn-comp-orange" id="btnWallet" onclick="goConnectWallet()">
      <span class="ico">&#128091;</span>
      <span class="wallet-text"><span id="lblWallet">CONNECT WALLET</span><span class="wallet-sub" id="walletSub"></span></span>
      <span class="lock" id="walletLock">&#128274;</span>
    </button>

    <div class="lang-row">
      <button class="flag-btn" id="flagFR" onclick="setLang('fr')">
        <svg viewBox="0 0 3 2"><rect width="1" height="2" x="0" fill="#0055A4"/><rect width="1" height="2" x="1" fill="#fff"/><rect width="1" height="2" x="2" fill="#EF4135"/></svg>
      </button>
      <button class="flag-btn" id="flagEN" onclick="setLang('en')">
        <svg viewBox="0 0 60 30"><clipPath id="s"><rect width="60" height="30"/></clipPath><g clip-path="url(#s)"><rect width="60" height="30" fill="#012169"/><path d="M0,0 60,30M60,0 0,30" stroke="#fff" stroke-width="6"/><path d="M0,0 60,30M60,0 0,30" stroke="#C8102E" stroke-width="4"/><path d="M30,0 30,30M0,15 60,15" stroke="#fff" stroke-width="10"/><path d="M30,0 30,30M0,15 60,15" stroke="#C8102E" stroke-width="6"/></g></svg>
      </button>
    </div>
  </div>

  <!-- ============ COMPETITION SUBMENU ============ -->
  <div class="card hidden" id="screenComp">
    <button class="back-btn" id="backComp1" onclick="show('screenMenu')">Retour</button>
    <div class="sec-title" id="compTitle">COMPETITION</div>
    <div class="sec-sub" id="compSub"></div>

    <button class="menu-btn btn-comp-green" id="btnResume" onclick="resumeCompetition()" style="display:none">
      <span class="ico">&#9654;</span><span id="lblResume">REPRENDRE</span>
    </button>
    <button class="menu-btn btn-purple" onclick="newCompetition()">
      <span class="ico">&#10024;</span><span id="lblNew">NOUVELLE PARTIE</span>
    </button>

    <div class="scores-box">
      <div class="sh" id="lblBest">&#127941; TOP 3 SCORES</div>
      <div id="scoresList"></div>
    </div>
  </div>

  <!-- ============ FREE PLAY (difficulty) ============ -->
  <div class="card hidden" id="screenFree">
    <button class="back-btn" id="backFree" onclick="show('screenMenu')">Retour</button>
    <div class="sec-title" id="freeTitle">JEU LIBRE</div>
    <div class="sec-sub" id="freeSub">Choisis ta difficulte</div>
    <div id="levelList"></div>
  </div>

  <!-- ============ GAME ============ -->
  <div class="card hidden" id="screenGame">
    <div class="game-top">
      <button class="back-btn" id="backGame" style="width:auto;margin-bottom:0;padding:7px 12px" onclick="quitGame()">Menu</button>
      <span class="lvl-badge" id="lvlBadge"></span>
    </div>

    <div class="hud" id="hud"></div>

    <div class="board-wrap"><div class="rows" id="rows"></div></div>

    <div class="legend" id="legend"></div>

    <div class="pad" id="pad"></div>

    <div class="pad-tools" id="padTools">
      <button class="tool-btn" id="toolErase" onclick="eraseSel()"><span>&#9003;</span><span id="lblErase">Gomme</span></button>
      <button class="tool-btn" id="toolHint" onclick="buyHint()"><span>&#128161;</span><span id="lblHint">Indice</span></button>
      <button class="tool-btn" id="toolSubmit" onclick="submitGuess()" style="background:rgba(22,163,74,0.3);border-color:var(--green)"><span>&#10003;</span><span id="lblSubmit">Valider</span></button>
    </div>

    <img class="mini-pilote hidden" id="miniPilote" alt="">
  </div>

  <!-- MODAL -->
  <div class="overlay" id="modalOverlay">
    <div class="modal">
      <img id="modalImg" alt="">
      <h2 id="modalTitle"></h2>
      <div class="modal-score hidden" id="modalScore"></div>
      <div class="secret-modal hidden" id="modalSecret"></div>
      <p id="modalText"></p>
      <button class="menu-btn btn-purple" style="margin-bottom:8px" id="modalBtn1" onclick="modalAction1()"></button>
      <button class="menu-btn btn-neutral" id="modalBtn2" onclick="modalAction2()"></button>
    </div>
  </div>
</div>

<div class="life-flash" id="lifeFlash">
  <img id="lifeImg" alt="">
  <div class="lf-txt" id="lifeTxt">-1 &#10084;&#65039;</div>
</div>

<div class="toast" id="toast"></div>

/* ---------- Persistent competition $FRANC bank ----------
   Starts at 200 $FRANC once. Never below 0.
   Code cracked = +600 $FRANC flat. Hint = -200 $FRANC. Max 2 hints/game. */
const HINT_COST   = 200;
const GRID_REWARD = 600;
const MAX_HINTS   = 2;
function getFranc(){
  const stored=localStorage.getItem('flcmm_compPoints');
  if(stored===null){ localStorage.setItem('flcmm_compPoints','200'); return 200; }
  return Math.max(0, parseInt(stored,10)||0);
}
function setFranc(v){ localStorage.setItem('flcmm_compPoints', String(Math.max(0, Math.round(v)))); }
function addFranc(delta){ const nv=Math.max(0, getFranc()+delta); setFranc(nv); return nv; }

let G = null;
function makeSecret(lv){
  const code=[];
  for(let i=0;i<lv.slots;i++){
    let c;
    do{ c=(Math.random()*lv.colors)|0; }while(!lv.dup && code.includes(c));
    code.push(c);
  }
  return code;
}
function freshGame(mode, levelIndex){
  const lv=LEVELS[levelIndex];
  return {
    mode,                       // 'comp' | 'free'
    levelIndex,
    slots:lv.slots, colors:lv.colors, maxTries:lv.tries, dup:lv.dup,
    secret:makeSecret(lv),
    guesses:[],                 // [{pegs:[...], black, white}]
    current:new Array(lv.slots).fill(null),
    selIndex:0,
    hintsUsed:0,
    revealed:new Array(lv.slots).fill(false),
    startTime:Date.now(),
    elapsed:0,
    lives: mode==='comp'?COMP_LIVES:null,
    francEarned: 0,
  };
}

/* =====================================================================
   WALLET / HOLDER DETECTION
   ===================================================================== */
async function detectHolder(){
  if(tg?.initData){
    try{
      const res=await fetch(BACKEND+'/check-franc',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({initData:tg.initData})
      });
      const d=await res.json();
      walletLinked = !!(d && d.walletLinked);

      // Verdict de déblocage : nouveau backend → d.unlocked,
      // ancien backend → fallback hasFranc. Les deux marchent.
      isHolder = !!(d && (d.unlocked ?? (d.walletLinked && d.hasFranc)));

      // Raison du déblocage : "solana" | "ton" | "stars" | null
      unlockReason = (d && d.reason) || (isHolder ? 'solana' : null);

      // Solde réel (0 pour un déblocage via Stars)
      francBalance = isHolder ? Number(d.balance || 0) : 0;

      localStorage.setItem('flcmm_holder',JSON.stringify(isHolder));
      localStorage.setItem('flcmm_balance',String(francBalance));
      localStorage.setItem('flcmm_walletLinked',JSON.stringify(walletLinked));
      localStorage.setItem('flcmm_reason', unlockReason || '');
    }catch(e){}
  }
  renderCompLock(); renderWalletStatus(); renderLevelList();
}
function renderWalletStatus(){
  const sub=document.getElementById('walletSub');
  const lock=document.getElementById('walletLock');
  const btn=document.getElementById('btnWallet');
  if(!sub||!lock||!btn)return;
  // color follows $FRANC state: green + open ONLY if holder, else orange + closed
  btn.classList.remove('btn-wallet','btn-comp-green','btn-comp-orange');
  if(isHolder){
    lock.textContent='\uD83D\uDD13';
    btn.classList.add('btn-comp-green');
    sub.className='wallet-sub ok';

    if(unlockReason==='stars'){
      sub.textContent='Unlocked via \u2B50';
    } else {
      const sym = unlockReason==='ton' ? '\uD83D\uDC8E' : '\u25CE';   // 💎 TON · ◎ Solana
      const bal = francBalance ? Number(francBalance).toLocaleString() : '?';
      sub.textContent=`${t('wConnected')} ${sym} \u00B7 ${bal} $FRANC`;
    }
  } else if(walletLinked){
    sub.className='wallet-sub warn';
    sub.textContent=t('wNoFranc');
    lock.textContent='\uD83D\uDD12';
    btn.classList.add('btn-comp-orange');
  } else {
    sub.className='wallet-sub warn';
    sub.textContent=t('wNotConnected');
    lock.textContent='\uD83D\uDD12';
    btn.classList.add('btn-comp-orange');
  }
}
function renderCompLock(){
  const btn=document.getElementById('btnComp'); const lock=document.getElementById('compLock');

  else { btn.classList.remove('btn-comp-green'); btn.classList.add('btn-comp-orange'); lock.textContent='\uD83D\uDD12'; }

function pegStyle(colorIdx){ return colorIdx==null ? '' : `background:${COLORS[colorIdx]}`; }

function buildPad(){

    const b=document.createElement('div');
    b.className='pad-peg';

function renderHUD(){
  const hud=document.getElementById('hud');
  const triesLeft=G.maxTries-G.guesses.length;
  let html='';
  if(G.mode==='comp'){
    html+=`<div class="chip lives"><span class="lab">${t('lives')}</span><span class="num">${'\u2764\uFE0F'.repeat(G.lives)||'0'}</span></div>`;
    html+=`<div class="chip franc"><span class="lab">${t('franc')}</span><span class="num">\uD83E\uDE99 ${getFranc().toLocaleString()}</span></div>`;
  }
  html+=`<div class="chip tries"><span class="lab">${t('tries')}</span><span class="num" id="triesNum">${triesLeft}/${G.maxTries}</span></div>`;
  html+=`<div class="chip time"><span class="lab">${t('time')}</span><span class="num" id="timeNum">0:00</span></div>`;
  hud.innerHTML=html;
}

function renderBoard(){
  const rows=document.getElementById('rows'); rows.innerHTML='';
  // past guesses (top = first)
  G.guesses.forEach((g,gi)=>{
    rows.appendChild(makeRow(g.pegs, gi+1, false, g));
  });
  // active row
  if(G.guesses.length<G.maxTries){
    rows.appendChild(makeRow(G.current, G.guesses.length+1, true, null));
  }
  // scroll to active
  setTimeout(()=>{ const w=document.querySelector('.board-wrap'); if(w)w.scrollTop=w.scrollHeight; },30);
}

function makeRow(pegs, num, active, fb){
  const row=document.createElement('div');
  row.className='row'+(active?' active':'');
  const rn=document.createElement('span'); rn.className='rownum'; rn.textContent=num; row.appendChild(rn);
  const pegsWrap=document.createElement('div'); pegsWrap.className='pegs';
  pegs.forEach((p,i)=>{
    const peg=document.createElement('div');
    const empty=(p==null);
    peg.className='peg'+(empty?' empty':'')+(active && i===G.selIndex?' sel':'');
    if(!empty) peg.style.cssText='background:'+COLORS[p];
    if(active){
      peg.onclick=()=>{ G.selIndex=i; renderBoard(); };
    }
    pegsWrap.appendChild(peg);
  });
  row.appendChild(pegsWrap);
  // feedback
  const f=document.createElement('div'); f.className='feedback';
  const total=pegs.length;
  if(fb){
    const marks=[];
    for(let i=0;i<fb.black;i++)marks.push('black');
    for(let i=0;i<fb.white;i++)marks.push('white');
    while(marks.length<total)marks.push('');
    marks.forEach(m=>{ const d=document.createElement('div'); d.className='fb'+(m?' '+m:''); f.appendChild(d); });
  } else {
    for(let i=0;i<total;i++){ const d=document.createElement('div'); d.className='fb'; f.appendChild(d); }
  }
  row.appendChild(f);
  return row;
}

function placeColor(color){
  if(!G) return;
  G.current[G.selIndex]=color;
  // auto-advance to the next still-empty slot so successive taps fill left to right;
  // if the row is full, keep the current selection so the player can keep correcting it
  for(let k=1;k<=G.slots;k++){
    const idx=(G.selIndex+k)%G.slots;
    if(G.current[idx]==null){ G.selIndex=idx; break; }
  }
  renderBoard();
}
function eraseSel(){ if(!G)return; G.current[G.selIndex]=null; renderBoard(); }

/* scoring of a guess: black = right color+pos, white = right color wrong pos */
function scoreGuess(guess, secret){
  let black=0, white=0;
  const s=secret.slice(), g=guess.slice();
  for(let i=0;i<g.length;i++){ if(g[i]===s[i]){black++; s[i]=-1; g[i]=-2;} }
  for(let i=0;i<g.length;i++){
    if(g[i]<0)continue;
    const j=s.indexOf(g[i]);
    if(j>=0){white++; s[j]=-1;}
  }
  return {black, white};
}

function submitGuess(){
  if(!G) return;
  if(G.current.some(p=>p==null)){ toast(t('fillRow')); return; }
  const fb=scoreGuess(G.current, G.secret);
  G.guesses.push({pegs:G.current.slice(), black:fb.black, white:fb.white});
  G.current=new Array(G.slots).fill(null); G.selIndex=0;
  if(G.mode==='comp')persist();
  renderHUD(); renderBoard();
  if(fb.black===G.slots){ onWin(); return; }
  if(G.guesses.length>=G.maxTries){ onLose(); }
}

/* =====================================================================
   HINT (competition only) — reveals one secret peg in next guess
   ===================================================================== */
function buyHint(){
  if(!G||G.mode!=='comp')return;
  if(G.hintsUsed>=MAX_HINTS){ toast(t('maxHints')); return; }
  if(getFranc()<HINT_COST){ toast(t('noFranc')); return; }
  // find a slot not yet revealed
  const candidates=[];
  for(let i=0;i<G.slots;i++) if(!G.revealed[i]) candidates.push(i);
  if(candidates.length===0){ toast(t('noHintNeeded')); return; }
  const idx=candidates[(Math.random()*candidates.length)|0];
  G.revealed[idx]=true; G.current[idx]=G.secret[idx];
  addFranc(-HINT_COST); G.hintsUsed++;
  toast(t('hintUsed')); renderHUD(); renderBoard(); persist();
}

   ===================================================================== */
function secretPegsHTML(){
  return G.secret.map(c=>`<span class="peg" style="background:${COLORS[c]}"></span>`).join('');
}
function onWin(){
  stopTimer(); G.elapsed=Date.now()-G.startTime;
  if(G.mode==='comp'){
    addFranc(GRID_REWARD); G.francEarned=(G.francEarned||0)+GRID_REWARD;
    const hasNext=G.levelIndex < LEVELS.length-1;
    setMiniCoq(IMG.coq_coeur, 30000); persist();
    showModal({
      img:IMG.coq_coeur, cls:'win', title:t('bravo'),
      score:`+${GRID_REWARD} $FRANC`,
      text: hasNext ? t('nextLvl') : t('allDone'),
      btn1: hasNext ? t('nextLevel') : t('backMenu'),
      btn2: t('toMenu'),
      action1: hasNext ? ()=>{ G=advanceComp(G); closeModal(); startGame(); } : ()=>finishCompetition(),
      action2: ()=>finishCompetition()
    });
  } else {
    setMiniCoq(IMG.coq_coeur, 30000);
    showModal({
      img:IMG.coq_coeur, cls:'win', title:t('bravo'), text:t('winText'),
      btn1:t('replay'), btn2:t('backMenu'),
      action1:()=>{G=freshGame('free',G.levelIndex); closeModal(); startGame();},
      action2:()=>{closeModal(); show('screenFree');}
    });
  }
}
function advanceComp(prev){
  const ng=freshGame('comp', prev.levelIndex+1);
  ng.lives=prev.lives; ng.francEarned=prev.francEarned;
  return ng;
}

function onLose(){
  stopTimer();
  if(G.mode==='comp'){
    G.lives--; flashLifeLost();
    if(G.lives>0){
      // retry same level with a new secret
      persist();
      showModal({
        img:IMG.coq_triste, cls:'lose', title:t('loseTitle'),
        secret:true, text:t('loseTextU'),
        btn1:t('replay'), btn2:t('toMenu'),
        action1:()=>{ const lvl=G.levelIndex, lives=G.lives, fe=G.francEarned;
          G=freshGame('comp',lvl); G.lives=lives; G.francEarned=fe; closeModal(); startGame(); },
        action2:()=>finishCompetition()
      });
    } else {
      onGameOver();
    }
  } else {
    setMiniCoq(IMG.coq_triste, 30000);
    showModal({
      img:IMG.coq_triste, cls:'lose', title:t('loseTitle'),
      secret:true, text:t('loseTextU'),
      btn1:t('replay'), btn2:t('backMenu'),
      action1:()=>{G=freshGame('free',G.levelIndex); closeModal(); startGame();},
      action2:()=>{closeModal(); show('screenFree');}
    });
  }
}

function onGameOver(){
  const francRun=(G.francEarned||0);
  const levelsCleared=Math.max(1,G.levelIndex);
  saveScore(francRun, levelsCleared); clearCompSave();
  setMiniCoq(IMG.coq_triste, 30000);
  showModal({
    img:IMG.coq_triste, cls:'lose', title:t('gameOver'),
    score:`\uD83E\uDE99 ${francRun.toLocaleString()} $FRANC`, secret:true,
    text:t('gameOverText'),
    btn1:t('replay'), btn2:t('backMenu'),
    action1:()=>{closeModal(); newCompetition();},
    action2:()=>{closeModal(); renderScores(); show('screenComp'); document.getElementById('btnResume').style.display='none';}
  });
}

function finishCompetition(){
  const francRun=(G.francEarned||0);
  const levelsCleared=G.levelIndex + 1;
  saveScore(francRun, levelsCleared); clearCompSave();
  closeModal();
  toast(`${t('newScore')} \u00B7 ${francRun.toLocaleString()} $FRANC`);
  renderScores(); show('screenComp');
  document.getElementById('btnResume').style.display='none';
}

}
function setMiniCoq(src, ms){
  const mini=document.getElementById('miniPilote'); if(!mini)return;
  mini.src=src; if(miniTimer)clearTimeout(miniTimer);
  miniTimer=setTimeout(()=>{ mini.src=IMG.coq_pilote; miniTimer=null; }, ms);
}
function resetMiniPilot(){
  if(miniTimer){clearTimeout(miniTimer);miniTimer=null;}
  const mini=document.getElementById('miniPilote'); if(mini)mini.src=IMG.coq_pilote;
}

/* =====================================================================
   MODALS
   ===================================================================== */
let _a1=null,_a2=null;
function showModal({img,cls,title,score,text,btn1,btn2,action1,action2,secret}){
  document.getElementById('modalImg').src=img;
  const tt=document.getElementById('modalTitle'); tt.className=cls||''; tt.textContent=title;
  const sc=document.getElementById('modalScore');
  if(score){sc.textContent=score; sc.classList.remove('hidden');}else{sc.classList.add('hidden');}
  const ms=document.getElementById('modalSecret');
  if(secret && G){ ms.innerHTML=secretPegsHTML(); ms.classList.remove('hidden'); }
  else{ ms.classList.add('hidden'); }
  document.getElementById('modalText').innerHTML = secret ? `${t('secretWas')}<br>${text}` : text;
  document.getElementById('modalBtn1').textContent=btn1;
  document.getElementById('modalBtn2').textContent=btn2;
  _a1=action1; _a2=action2;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}
function modalAction1(){if(_a1)_a1();}
function modalAction2(){if(_a2)_a2();}
function showLockModal(kind){
  showModal({
    img:IMG.coq_triste, cls:'locked', title:t('lockedTitle'),
    text: kind==='comp'? t('lockedComp') : t('lockedLvl'),
    btn1:t('btnConnect'), btn2:t('btnClose'),
    action1:()=>{closeModal(); goConnectWallet();},
    action2:()=>closeModal()
  });
}

/* =====================================================================
   QUIT
   ===================================================================== */
function quitGame(){
  if(G && G.mode==='comp'){ persist(); show('screenMenu'); }
  else { show('screenFree'); }
}

/* =====================================================================
   TOAST
   ===================================================================== */
let toastT=null;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),2200);
}

   INIT
   ===================================================================== */
window.addEventListener('load',()=>{
  document.getElementById('brandImg').src=IMG.coq_pilote;
  document.getElementById('miniPilote').src=IMG.coq_pilote;
  document.getElementById('modalImg').src=IMG.coq_coeur;
  document.getElementById('lifeImg').src=IMG.coq_triste;
  if(tg){tg.ready(); tg.expand();}
  setLang(lang);
  renderCompLock(); renderWalletStatus(); renderLevelList(); renderScores();
  detectHolder();
});
</script>
